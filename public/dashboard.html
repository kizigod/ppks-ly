<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PPKS.Ly</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .qr-thumbnail img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 1px solid #ddd;
            padding: 2px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container dashboard-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin:0;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Home</a>
        </div>

        <div style="background: #F7FAF7; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(45,90,39,0.1);">
            <form id="shorten-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="url" id="longUrl" placeholder="Tempel link..." required style="flex: 2; margin-bottom: 0;">
                <input type="text" id="customCode" placeholder="Custom..." style="flex: 1; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 25px;">Shorten!</button>
            </form>
        </div>

        <div class="stats-container">
            <div class="stat-box"><span class="stat-value" id="total-links">0</span><p>Links</p></div>
            <div class="stat-box"><span class="stat-value" id="total-clicks">0</span><p>Clicks</p></div>
        </div>

        <div class="table-wrapper">
            <table class="link-table">
                <thead>
                    <tr>
                        <th>Link</th>
                        <th>Media</th>
                        <th>Klik</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="link-list"></tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Keluar Akun</a>
        </div>
    </div>

  <script>
    // 1. Fungsi Menampilkan Modal (Dibuat sama persis dengan UI Gambar)
    function showModal(url, shortCode) {
        Swal.fire({
            showConfirmButton: false, // Kita buat tombol custom di dalam HTML
            width: '420px',
            background: '#ffffff',
            padding: '20px',
            borderRadius: '25px',
            html: `
                <div style="position:relative; text-align:center;">
                    <h2 style="color: #2D5A27; font-size: 1.5rem; margin-top: 10px;">Link Ready! 🚀</h2>
                    
                    <div style="background: #ffffff; padding: 15px; border-radius: 20px; border: 1px solid #f0f4f0; display: inline-block; margin-top: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                        <div id="modal-qr-render"></div>
                        <p style="font-size: 0.65rem; color: #666; margin-top: 10px; font-weight: 600;">Scan QR Code</p>
                    </div>

                    <hr style="border: 0; border-top: 1px dashed #ddd; margin: 25px 0;">

                    <div style="text-align: center;">
                        <canvas id="modal-barcode-render"></canvas>
                        <p style="font-size: 0.65rem; color: #666; margin: 0; font-weight: 600;">Barcode (Internal Tracking)</p>
                    </div>

                    <div style="background: #f0f4f0; color: #2D5A27; padding: 12px; border-radius: 12px; margin: 20px 0 10px 0; font-weight: 700; font-size: 0.85rem; word-break: break-all; border: 1px solid rgba(45,90,39,0.1);">
                        ${url}
                    </div>

                    <button onclick="copyAndClose('${url}')" style="background: #2D5A27; color: white; border: none; padding: 12px 0; width: 100%; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: 0.3s;">
                        Salin Link
                    </button>

                    <div style="margin-top: 15px;">
                        <a href="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${url}" download="QR_${shortCode}.png" target="_blank" style="color: #2D5A27; text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px;">
                            ⬇️ Download QR Code
                        </a>
                    </div>
                </div>
            `,
            didOpen: () => {
                // Render QR Code
                new QRCode(document.getElementById("modal-qr-render"), {
                    text: url,
                    width: 150,
                    height: 150,
                    correctLevel: QRCode.CorrectLevel.H
                });

                // Render Barcode
                JsBarcode("#modal-barcode-render", shortCode, {
                    format: "CODE128",
                    lineColor: "#2D5A27",
                    width: 1.8,
                    height: 45,
                    displayValue: true,
                    fontSize: 12
                });
            }
        });
    }

    // Fungsi Pembantu Salin & Notif
    function copyAndClose(url) {
        navigator.clipboard.writeText(url);
        Swal.fire({
            toast: true,
            position: 'top-end',
            icon: 'success',
            title: 'Link disalin!',
            showConfirmButton: false,
            timer: 1500
        });
    }

    // 2. Fungsi Load Dashboard & Tabel
    async function loadLinks() {
        try {
            const res = await fetch('/api/user/links');
            if (res.status === 401) { window.location.href = '/'; return; }
            const links = await res.json();
            const list = document.getElementById('link-list');
            let totalClicks = 0;
            list.innerHTML = '';

            links.forEach(link => {
                totalClicks += link.clicks;
                const fullUrl = `${window.location.origin}/${link.shortCode}`;
                list.innerHTML += `
                    <tr>
                        <td><a href="/${link.shortCode}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none;">/${link.shortCode}</a></td>
                        <td>
                            <div class="qr-thumbnail" onclick="showModal('${fullUrl}', '${link.shortCode}')" style="cursor:pointer; opacity:0.8;">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=${fullUrl}" style="width:35px; border-radius:5px;">
                            </div>
                        </td>
                        <td><span class="badge" style="background:var(--primary); color:white; padding:2px 8px; border-radius:10px;">${link.clicks}</span></td>
                        <td><button onclick="deleteLink('${link._id}')" style="background:#ef44441a; color:#ef4444; border:none; padding:5px 12px; border-radius:8px; cursor:pointer; font-weight:600;">Hapus</button></td>
                    </tr>
                `;
            });
            document.getElementById('total-links').innerText = links.length;
            document.getElementById('total-clicks').innerText = totalClicks;
        } catch (err) { console.error(err); }
    }

    // 3. Handling Submit Form Dashboard (Dengan Loading)
    document.getElementById('shorten-form').onsubmit = async (e) => {
        e.preventDefault();
        const longUrl = document.getElementById('longUrl').value;
        const customCode = document.getElementById('customCode').value;

        Swal.fire({
            title: 'Memproses...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl, customCode })
            });
            const data = await res.json();
            
            Swal.close();

            if (res.ok) {
                showModal(data.shortUrl, data.shortCode);
                document.getElementById('shorten-form').reset();
                loadLinks();
            } else {
                Swal.fire({ icon: 'warning', title: 'Gagal', text: data.message });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Server Error' });
        }
    };

    async function deleteLink(id) {
        const confirm = await Swal.fire({ title: 'Hapus?', icon: 'warning', showCancelButton: true });
        if (confirm.isConfirmed) {
            await fetch(`/api/link/${id}`, { method: 'DELETE' });
            loadLinks();
        }
    }

    loadLinks();
</script>
</body>
</html>
