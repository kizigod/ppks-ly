<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PPKS.Ly</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .qr-thumbnail img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 1px solid #ddd;
            padding: 2px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container dashboard-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin:0;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Home</a>
        </div>

        <div style="background: #F7FAF7; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(45,90,39,0.1);">
            <form id="shorten-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="url" id="longUrl" placeholder="Tempel link..." required style="flex: 2; margin-bottom: 0;">
                <input type="text" id="customCode" placeholder="Custom..." style="flex: 1; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 25px;">Shorten!</button>
            </form>
        </div>

        <div class="stats-container">
            <div class="stat-box"><span class="stat-value" id="total-links">0</span><p>Links</p></div>
            <div class="stat-box"><span class="stat-value" id="total-clicks">0</span><p>Clicks</p></div>
        </div>

        <div class="table-wrapper">
            <table class="link-table">
                <thead>
                    <tr>
                        <th>Link</th>
                        <th>Media</th>
                        <th>Klik</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="link-list"></tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Keluar Akun</a>
        </div>
    </div>

    <script>
        // 1. Fungsi Pop-up Sukses dengan QR & Barcode
        function showSuccessModal(url, shortCode) {
            Swal.fire({
                title: 'Link Ready! 🚀',
                html: `
                    <div style="display:flex; flex-direction:column; align-items:center; gap:15px; padding-top:10px;">
                        <div id="modal-qr-render"></div>
                        
                        <div style="border-top: 1px dashed #ddd; padding-top:15px; width:100%; text-align:center;">
                            <canvas id="modal-barcode-render"></canvas>
                            <p style="font-size:0.7rem; margin:0; color:#666; font-weight:600;">BARCODE TRACKING</p>
                        </div>

                        <div style="background:#f7faf7; padding:10px; border-radius:10px; width:100%; font-weight:800; color:var(--primary); word-break:break-all;" id="copy-target">
                            ${url}
                        </div>
                    </div>
                `,
                confirmButtonText: 'Salin Link',
                confirmButtonColor: '#2D5A27',
                didOpen: () => {
                    // Render QR Code di Modal
                    new QRCode(document.getElementById("modal-qr-render"), {
                        text: url,
                        width: 150,
                        height: 150
                    });

                    // Render Barcode di Modal
                    JsBarcode("#modal-barcode-render", shortCode, {
                        format: "CODE128",
                        lineColor: "#2D5A27",
                        width: 2,
                        height: 50,
                        displayValue: true
                    });
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    navigator.clipboard.writeText(url);
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Disalin!', showConfirmButton: false, timer: 1000 });
                }
            });
        }

        // 2. Load Data Links
        async function loadLinks() {
            try {
                const res = await fetch('/api/user/links');
                if (res.status === 401) { window.location.href = '/'; return; }
                const links = await res.json();
                const list = document.getElementById('link-list');
                let totalClicks = 0;
                list.innerHTML = '';

                links.forEach(link => {
                    totalClicks += link.clicks;
                    const fullUrl = `${window.location.origin}/${link.shortCode}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="/${link.shortCode}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none;">/${link.shortCode}</a></td>
                        <td>
                            <div class="qr-thumbnail" id="qr-table-${link._id}" onclick="showSuccessModal('${fullUrl}', '${link.shortCode}')"></div>
                        </td>
                        <td><span class="badge" style="background:var(--primary); color:white; padding:2px 8px; border-radius:10px;">${link.clicks}</span></td>
                        <td><button onclick="deleteLink('${link._id}')" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:8px; cursor:pointer;">Hapus</button></td>
                    `;
                    list.appendChild(tr);

                    // Render QR Kecil di tabel
                    new QRCode(document.getElementById(`qr-table-${link._id}`), { 
                        text: fullUrl, 
                        width: 40, 
                        height: 40 
                    });
                });

                document.getElementById('total-links').innerText = links.length;
                document.getElementById('total-clicks').innerText = totalClicks;
            } catch (err) {
                console.error("Gagal memuat links:", err);
            }
        }

        // 3. Submit Form
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customCode })
                });
                const data = await res.json();

                if (res.ok) {
                    showSuccessModal(data.shortUrl, data.shortCode);
                    document.getElementById('shorten-form').reset();
                    loadLinks();
                } else {
                    Swal.fire('Gagal', data.message, 'warning');
                }
            } catch (err) {
                Swal.fire('Error', 'Gagal memproses link', 'error');
            }
        };

        // 4. Hapus Link
        async function deleteLink(id) {
            const confirmDel = await Swal.fire({
                title: 'Hapus Link?',
                text: "Data tidak bisa dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus!'
            });

            if (confirmDel.isConfirmed) {
                await fetch(`/api/link/${id}`, { method: 'DELETE' });
                loadLinks();
            }
        }

        // Jalankan saat pertama kali dibuka
        loadLinks();
    </script>
</body>
</html>
