<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PPKS.Ly</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        .qr-thumbnail img {
            width: 50px;
            height: 50px;
            cursor: pointer;
            border: 1px solid #ddd;
            padding: 2px;
            background: white;
        }
    </style>
</head>
<body>
    <div class="container dashboard-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin:0;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Home</a>
        </div>

        <div style="background: #F7FAF7; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(45,90,39,0.1);">
            <form id="shorten-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="url" id="longUrl" placeholder="Tempel link..." required style="flex: 2; margin-bottom: 0;">
                <input type="text" id="customCode" placeholder="Custom..." style="flex: 1; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 25px;">Shorten!</button>
            </form>
        </div>

        <div class="stats-container">
            <div class="stat-box"><span class="stat-value" id="total-links">0</span><p>Links</p></div>
            <div class="stat-box"><span class="stat-value" id="total-clicks">0</span><p>Clicks</p></div>
        </div>

        <div class="table-wrapper">
            <table class="link-table">
                <thead>
                    <tr>
                        <th>Link</th>
                        <th>Media</th>
                        <th>Klik</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="link-list"></tbody>
            </table>
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Keluar Akun</a>
        </div>
    </div>

   <script>
    // 1. Fungsi Utama untuk Menampilkan Modal Berhasil (Sama dengan Index)
    function showModal(url, qr, shortCode) {
        Swal.fire({
            title: 'Link Ready! 🚀',
            html: `
                <div style="display:flex; flex-direction:column; align-items:center; gap:15px; padding-top:10px;">
                    <div style="text-align:center;">
                        <img src="${qr}" id="qrImg" style="width:160px; border-radius:15px; border:4px solid #f0f4f0; image-rendering: pixelated;">
                        <p style="font-size:0.7rem; margin-top:5px; color:#666; font-weight:600;">QR CODE</p>
                    </div>
                    
                    <div style="border-top: 1px dashed #ddd; padding-top:15px; width:100%; text-align:center;">
                        <canvas id="barcodeCanvasModal"></canvas>
                        <p style="font-size:0.7rem; margin:0; color:#666; font-weight:600;">BARCODE TRACKING</p>
                    </div>

                    <div style="background:#f7faf7; padding:12px; border-radius:12px; width:100%; word-break:break-all; font-weight:800; color:var(--primary); font-size: 0.9rem;" id="modal-url">
                        ${url}
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'Salin Link',
            confirmButtonColor: '#2D5A27',
            cancelButtonText: 'Tutup',
            // KUNCI: Render Barcode tepat saat modal terbuka
            didOpen: () => {
                JsBarcode("#barcodeCanvasModal", shortCode, {
                    format: "CODE128",
                    lineColor: "#2D5A27",
                    width: 2,
                    height: 45,
                    displayValue: true,
                    fontSize: 12
                });
            }
        }).then((result) => {
            if (result.isConfirmed) {
                navigator.clipboard.writeText(url);
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Disalin!', showConfirmButton: false, timer: 1500 });
            }
        });
    }

    // 2. Fungsi Load Data Tabel
    async function loadLinks() {
        try {
            const res = await fetch('/api/user/links');
            if (res.status === 401) { window.location.href = '/'; return; }
            const links = await res.json();
            const list = document.getElementById('link-list');
            let totalClicks = 0;
            list.innerHTML = '';

            links.forEach(link => {
                totalClicks += link.clicks;
                const fullUrl = `${window.location.origin}/${link.shortCode}`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="/${link.shortCode}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none;">/${link.shortCode}</a></td>
                    <td>
                        <div class="qr-thumbnail" onclick="showModal('${fullUrl}', 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${fullUrl}', '${link.shortCode}')">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=50x50&data=${fullUrl}" style="width:40px; border-radius:5px; cursor:pointer;">
                        </div>
                    </td>
                    <td><span class="badge" style="background:var(--primary); color:white; padding:2px 8px; border-radius:10px;">${link.clicks}</span></td>
                    <td><button onclick="deleteLink('${link._id}')" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:8px; cursor:pointer;">Hapus</button></td>
                `;
                list.appendChild(tr);
            });

            document.getElementById('total-links').innerText = links.length;
            document.getElementById('total-clicks').innerText = totalClicks;
        } catch (err) { console.error(err); }
    }

    // 3. Handling Submit Form dengan Efek Loading
    document.getElementById('shorten-form').onsubmit = async (e) => {
        e.preventDefault();
        const longUrl = document.getElementById('longUrl').value;
        const customCode = document.getElementById('customCode').value;

        // TAMPILKAN LOADING (Sama dengan Halaman Utama)
        Swal.fire({
            title: 'Memproses...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl, customCode })
            });
            const data = await res.json();
            
            Swal.close(); // Tutup loading

            if (res.ok) {
                // Tampilkan Modal Berhasil
                showModal(data.shortUrl, data.qrData, data.shortCode);
                document.getElementById('shorten-form').reset();
                loadLinks(); // Refresh tabel
            } else {
                Swal.fire({ icon: 'warning', title: 'Gagal', text: data.message });
            }
        } catch (err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal menghubungi server' });
        }
    };

    async function deleteLink(id) {
        if(confirm('Hapus link ini?')) {
            await fetch(`/api/link/${id}`, { method: 'DELETE' });
            loadLinks();
        }
    }

    // Jalankan load pertama kali
    loadLinks();
</script>
</body>
</html>
