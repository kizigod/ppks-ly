<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - PPKS.ly</title>
    <link rel="stylesheet" href="style.css?v=2.3">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <div class="container dashboard-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h1 style="margin:0; font-size: 1.8rem;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600; font-size: 0.9rem;">← Home</a>
                <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem; font-weight: 600;">Keluar</a>
            </div>
        </div>

        <div style="background: rgba(255,255,255,0.5); padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(45,90,39,0.1);">
            <form id="shorten-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="url" id="longUrl" placeholder="Tempel link panjang di sini..." required style="flex: 2; margin-bottom: 0;">
                <input type="text" id="customCode" placeholder="Custom nama (opsional)" style="flex: 1; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 30px;">Shorten!</button>
            </form>
        </div>

    
<div style="text-align: right; margin-bottom: 15px;">
    <button onclick="generatePDF()" style="width: auto; background: #c2410c; padding: 10px 25px; font-size: 0.8rem; border-radius: 12px;">
        📄 Download Laporan PDF
    </button>
</div>

        <div class="stats-container">
            <div class="stat-box">
                <span class="stat-value" id="total-links">0</span>
                <p style="margin:5px 0 0; font-size: 0.8rem; color: #666; font-weight: 600;">Total Links</p>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="total-clicks">0</span>
                <p style="margin:5px 0 0; font-size: 0.8rem; color: #666; font-weight: 600;">Total Clicks</p>
            </div>
        </div>

        <h3 style="color: var(--primary); margin-bottom: 15px;">Daftar Link Kamu</h3>
        
        <div class="table-wrapper">
            <table class="link-table">
                <thead>
                    <tr>
                        <th>Short Link</th>
                        <th style="text-align: center;">Media</th>
                        <th style="text-align: center;">Klik</th>
                        <th style="text-align: right;">Aksi</th>
                    </tr>
                </thead>
                <tbody id="link-list">
                    </tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" style="max-width: 400px; border-radius: 30px;">
            <span style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px; color: #8BA888;" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary); margin-bottom: 20px;">Link Ready! 🚀</h2>
            
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <div style="background: white; padding: 15px; border-radius: 20px; border: 1px solid #f0f4f0; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                    <div id="modal-qr-render"></div>
                    <p style="font-size: 0.65rem; color: #666; margin-top: 10px; font-weight: 600; text-transform: uppercase;">Scan QR Code</p>
                </div>
                
                <div id="barcode-wrap" style="width: 100%; border-top: 1px dashed #ddd; padding-top: 20px; margin-top: 10px; text-align: center;">
                    <canvas id="barcodeCanvasModal"></canvas>
                    <p style="font-size: 0.65rem; font-weight: 600; color: #666; margin: 5px 0 0;">Barcode (Internal Tracking)</p>
                </div>
            </div>

            <div style="background:var(--bg); padding:14px; border-radius:15px; margin:20px 0; word-break:break-all; font-weight:800; color:var(--primary); font-size: 0.85rem; border: 1px solid rgba(45,90,39,0.1);" id="modal-url"></div>
            
            <button onclick="copyLink()" style="background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 15px; font-weight: 700; cursor: pointer; transition: 0.3s;">Salin Link</button>
            
            <div style="margin-top: 15px;">
                <a id="download-link" href="#" download="QR_Code.png" target="_blank" style="color: var(--primary); text-decoration: none; font-size: 0.75rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 5px;">
                    ⬇️ Download QR Code
                </a>
            </div>
        </div>
    </div>

    <script>
        // 1. Fungsi Menampilkan Modal (Gaya Gambar Kamu)
        function showModal(url, shortCode) {
            document.getElementById('modal-url').innerText = url;
            
            // Render QR Code
            const qrSpace = document.getElementById("modal-qr-render");
            qrSpace.innerHTML = ''; 
            new QRCode(qrSpace, {
                text: url,
                width: 160,
                height: 160,
                correctLevel: QRCode.CorrectLevel.H
            });

            // Untuk Rendering BArcode
            JsBarcode("#barcodeCanvasModal", shortCode, {
                format: "CODE128",
                lineColor: "#2D5A27",
                width: 1.8,
                height: 45,
                displayValue: true,
                fontSize: 12
            });

            // Set link download (ambil dari canvas/img QR)
            setTimeout(() => {
                const qrImg = qrSpace.querySelector('img').src;
                document.getElementById('download-link').href = qrImg;
                document.getElementById('download-link').download = `QR_${shortCode}.png`;
            }, 400);

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function copyLink() { 
            const urlText = document.getElementById('modal-url').innerText;
            navigator.clipboard.writeText(urlText); 
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Link disalin!', showConfirmButton: false, timer: 1500 });
        }

        // 2. Fungsi Ambil Data Links
        async function loadLinks() {
            try {
                const res = await fetch('/api/user/links');
                if (res.status === 401) { window.location.href = '/'; return; }
                const links = await res.json();
                const list = document.getElementById('link-list');
                let clicks = 0; 
                list.innerHTML = '';

                if (links.length === 0) {
                    list.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:#999;">Belum ada link yang dibuat.</td></tr>';
                }

                links.forEach(link => {
                    clicks += link.clicks;
                    const fullUrl = `${window.location.origin}/${link.shortCode}`;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><a href="/${link.shortCode}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none;">/${link.shortCode}</a></td>
                        <td style="text-align:center;">
                            <div class="qr-thumbnail" onclick="showModal('${fullUrl}', '${link.shortCode}')">
                                <img src="https://api.qrserver.com/v1/create-qr-code/?size=40x40&data=${fullUrl}" style="width:35px; border-radius:5px;">
                            </div>
                        </td>
                        <td style="text-align:center;"><span class="badge" style="background:var(--primary); color:white; padding:3px 10px; border-radius:10px; font-size:0.8rem; font-weight:700;">${link.clicks}</span></td>
                        <td style="text-align:right;"><button onclick="deleteLink('${link._id}')" style="background:#fee2e2; color:#ef4444; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:600; font-size:0.75rem;">Hapus</button></td>
                    `;
                    list.appendChild(tr);
                });
                document.getElementById('total-links').innerText = links.length;
                document.getElementById('total-clicks').innerText = clicks;
            } catch (err) { console.error("Gagal muat data:", err); }
        }

        // 3. Handling Submit Form (Loading -> Modal)
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;

            // Efek Loading seperti Halaman Utama
            Swal.fire({
                title: 'Memproses...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customCode })
                });
                const data = await res.json();
                
                Swal.close(); // Tutup Loading

                if (res.ok) {
                    showModal(data.shortUrl, data.shortCode);
                    document.getElementById('shorten-form').reset();
                    loadLinks();
                } else {
                    Swal.fire({ icon: 'warning', title: 'Gagal', text: data.message });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'Gagal menghubungi server' });
            }
        };

        async function deleteLink(id) {
            Swal.fire({
                title: 'Hapus Link?',
                text: "Data klik akan hilang permanen!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    await fetch(`/api/link/${id}`, { method: 'DELETE' });
                    loadLinks();
                }
            });
        }

        // Inisialisasi awal
        loadLinks();

        async function generatePDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    Swal.fire({ title: 'Menyiapkan PDF...', didOpen: () => Swal.showLoading() });

    // Judul Laporan
    doc.setFontSize(18);
    doc.setTextColor(45, 90, 39); 
    doc.text("LAPORAN DATA ASET POHON SAWIT", 105, 20, { align: "center" });
    
    doc.setFontSize(10);
    doc.setTextColor(100);
    doc.text(`Dicetak: ${new Date().toLocaleString('id-ID')}`, 105, 28, { align: "center" });

    const res = await fetch('/api/user/links');
    const links = await res.json();

    const bodyData = links.map((link, i) => [
        i + 1,
        link.shortCode, 
        `${window.location.origin}/${link.shortCode}`,
        link.clicks,
        "" // Placeholder untuk QR
    ]);

    doc.autoTable({
        startY: 35,
        head: [['No', 'Kode Khusus', 'Link Pelacakan', 'Klik', 'QR Code']],
        body: bodyData,
        theme: 'grid',
        headStyles: { fillColor: [45, 90, 39] },
        styles: { valign: 'middle', halign: 'center', fontSize: 9 },
        columnStyles: { 2: { halign: 'left', cellWidth: 50 }, 4: { cellWidth: 35, minCellHeight: 35 } },
        didDrawCell: (data) => {
            if (data.column.index === 4 && data.cell.section === 'body') {
                const link = links[data.row.index];
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=${window.location.origin}/${link.shortCode}`;
                doc.addImage(qrUrl, 'PNG', data.cell.x + 5, data.cell.y + 5, 25, 25);
            }
        }
    });

    Swal.close();
    doc.save(`Laporan_PPKS_Aset.pdf`);
}
    </script>
</body>
</html>
