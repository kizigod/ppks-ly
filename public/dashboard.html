<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PPKS.Ly</title>
    <link rel="stylesheet" href="style.css?v=2.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container dashboard-wide">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin:0;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <a href="/" style="color: var(--primary); text-decoration: none; font-weight: 600;">← Home</a>
        </div>

        <div style="background: #F7FAF7; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(45,90,39,0.1);">
            <form id="shorten-form" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="url" id="longUrl" placeholder="Tempel link..." required style="flex: 2; margin-bottom: 0;">
                <input type="text" id="customCode" placeholder="Custom..." style="flex: 1; margin-bottom: 0;">
                <button type="submit" style="width: auto; padding: 0 25px;">Shorten!</button>
            </form>
        </div>

        <div class="stats-container">
            <div class="stat-box"><span class="stat-value" id="total-links">0</span><p>Links</p></div>
            <div class="stat-box"><span class="stat-value" id="total-clicks">0</span><p>Clicks</p></div>
        </div>

        <div class="table-wrapper">
    <table class="link-table">
        <thead>
            <tr>
                <th>Link</th>
                <th>QR</th>
                <th>Klik</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="link-list">
            </tbody>
    </table>
</div>

        <div style="text-align: center; margin-top: 30px;"><a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.9rem;">Keluar Akun</a></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px;" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary);">Link Ready! 🚀</h2>
            <div id="modal-qr-space"><img src="" id="qrImg" style="width:180px; border-radius:15px; border:4px solid var(--bg);"></div>
            <div style="background:var(--bg); padding:10px; border-radius:10px; margin:15px 0; word-break:break-all; font-weight:800; color:var(--primary);" id="modal-url"></div>
            <button onclick="copyLink()">Copy Link</button>
        </div>
    </div>

    <script>
        function showModal(url, qr) {
            document.getElementById('modal-url').innerText = url;
            document.getElementById('qrImg').src = qr || '';
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function copyLink() { navigator.clipboard.writeText(document.getElementById('modal-url').innerText); alert("Copied!"); }

        async function loadLinks() {
            const res = await fetch('/api/user/links');
            const links = await res.json();
            const list = document.getElementById('link-list');
            let clicks = 0; list.innerHTML = '';

            links.forEach(link => {
                clicks += link.clicks;
                const fullUrl = `${window.location.origin}/${link.shortCode}`;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><a href="/${link.shortCode}" target="_blank" style="color:var(--primary); font-weight:800; text-decoration:none;">/${link.shortCode}</a></td>
                    <td><div class="qr-thumbnail" id="qr-${link._id}" onclick="showModal('${fullUrl}', document.querySelector('#qr-${link._id} img').src)"></div></td>
                    <td><span class="badge" style="background:var(--primary); color:white; padding:2px 8px; border-radius:10px;">${link.clicks}</span></td>
                    <td><button onclick="deleteLink('${link._id}')" style="background:#ef4444; color:white; border:none; padding:5px 10px; border-radius:8px; cursor:pointer;">Hapus</button></td>
                `;
                list.appendChild(tr);
                new QRCode(document.getElementById(`qr-${link._id}`), { 
    text: fullUrl, 
    width: 100, // Naikkan resolusi internal
    height: 100, 
    correctLevel: QRCode.CorrectLevel.H // High error correction agar lebih mudah di-scan
});
            });
            document.getElementById('total-links').innerText = links.length;
            document.getElementById('total-clicks').innerText = clicks;
        }

        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl: document.getElementById('longUrl').value, customCode: document.getElementById('customCode').value })
            });
            const data = await res.json();
            if (res.ok) { showModal(data.shortUrl, data.qrData); loadLinks(); }
        };

        async function deleteLink(id) { if(confirm('Hapus?')) { await fetch(`/api/link/${id}`, { method: 'DELETE' }); loadLinks(); } }
        loadLinks();
    </script>
</body>
</html>
