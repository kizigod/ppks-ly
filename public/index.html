<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKS.Ly - Smart URL Shortener</title>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 2.5rem;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <p style="margin-top: 5px; color: var(--text-dark); opacity: 0.7;">Solusi cerdas perpendek link & QR Code</p>
        </div>

        <form id="shorten-form">
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Link Panjang</label>
            <input type="url" id="longUrl" placeholder="https://..." required>
            
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Custom Nama (Opsional)</label>
            <input type="text" id="customCode" placeholder="misal: info-sawit">
            
            <button type="submit">Shortenlink!</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(45, 90, 39, 0.1);">

        <div id="auth-section">
            <div id="login-section" style="text-align: center;">
                <p style="font-size: 0.85rem; margin-bottom: 20px; color: var(--text-dark);">
                    Daftar untuk mengelola riwayat link & statistik klik kamu.
                </p>
                <a href="/auth/google" class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" height="18" alt="Google">
                    Masuk dengan Google
                </a>
            </div>

            <div id="user-profile" style="display: none; text-align: center;">
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid rgba(45, 90, 39, 0.1);">
                    <p style="margin-bottom: 15px; font-weight: 600;">Halo, <span id="user-name" style="color: var(--primary);"></span>! 👋</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <a href="/dashboard.html" style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 600;">Dashboard</a>
                        <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.85rem; align-self: center;">Keluar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px; color: var(--accent);" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary); margin-top: 10px;">Link Ready! 🚀</h2>
            <div id="modal-qr-space">
                <img src="" id="qrImg" style="width:180px; border-radius:15px; border:4px solid var(--bg); margin: 15px 0;">
            </div>
            <div style="background:var(--bg); padding:12px; border-radius:12px; margin-bottom:15px; word-break:break-all; font-weight:800; color:var(--primary); font-size: 0.9rem;" id="modal-url"></div>
            <button onclick="copyLink()">Salin Link</button>
            <a id="downloadBtn" href="#" download="qr-ppks.png" style="display: block; margin-top: 15px; font-size: 0.8rem; color: var(--primary); font-weight: 600; text-decoration: none;">⬇️ Download QR</a>
        </div>
    </div>

    <script>
        // 1. Fungsi Modal
        function showModal(url, qr) {
            document.getElementById('modal-url').innerText = url;
            document.getElementById('qrImg').src = qr;
            document.getElementById('downloadBtn').href = qr;
            document.getElementById('modalOverlay').classList.add('active');
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
        function copyLink() { 
            navigator.clipboard.writeText(document.getElementById('modal-url').innerText); 
            alert("Link disalin!"); 
        }

        // 2. Cek Login Status
        async function checkStatus() {
            const res = await fetch('/api/user/status');
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-name').innerText = data.user.displayName;
            }
        }
        checkStatus();

        // 3. Handle Form
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;
            
            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customCode })
                });
                const data = await res.json();
                if (res.ok) {
                    showModal(data.shortUrl, data.qrData);
                } else {
                    alert(data.message);
                }
            } catch (err) { alert("Server error!"); }
        };
    </script>
</body>
</html>
