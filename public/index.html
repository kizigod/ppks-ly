<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKS.Ly - Smart URL Shortener</title>
    <link rel="stylesheet" href="style.css?v=1.2">
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 2.5rem;">PPKS<span style="color: var(--accent);">.ly</span></h1>
            <p style="margin-top: 5px; color: var(--text-dark); opacity: 0.7;">Pendekkan link dan buat QR Code instan</p>
        </div>

        <form id="shorten-form">
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Link Panjang</label>
            <input type="url" id="longUrl" placeholder="https://youtube.com/..." required>
            
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Custom Nama (Opsional)</label>
            <input type="text" id="customCode" placeholder="misal: pendaftaran-sawit">
            
            <button type="submit">Shortenlink!</button>
        </form>

        <div id="result"></div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(45, 90, 39, 0.1);">

        <div id="auth-section">
            <div id="login-section" style="text-align: center;">
                <p style="font-size: 0.85rem; margin-bottom: 20px;">
                    Simpan dan kelola semua link kamu secara permanen dalam satu dashboard.
                </p>
                <a href="/auth/google" class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" height="18" alt="Google">
                    Masuk dengan Google
                </a>
            </div>

            <div id="user-profile" style="display: none; text-align: center; animation: fadeIn 0.5s ease;">
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid rgba(45, 90, 39, 0.1);">
                    <p style="margin-bottom: 15px; font-weight: 600;">Halo, <span id="user-name" style="color: var(--primary);"></span>! 👋</p>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <a href="/dashboard.html" class="btn-dashboard-small" style="padding: 10px 20px; text-decoration: none;">Dashboard</a>
                        <a href="/logout" class="btn-logout-link" style="align-self: center;">Keluar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Cek Status Login
        async function checkLoginStatus() {
            try {
                const res = await fetch('/api/user/status');
                const data = await res.json();
                
                if (data.loggedIn) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('user-profile').style.display = 'block';
                    document.getElementById('user-name').innerText = data.user.displayName;
                }
            } catch (err) {
                console.log("Belum login");
            }
        }

        checkLoginStatus();

        // 2. Submit Form
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = '<p style="text-align:center; color: var(--primary);">⌛ Sedang memproses...</p>';

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customCode })
                });

                const data = await res.json();

                if (res.ok) {
                    resultDiv.innerHTML = `
                        <div class="result-card">
                            <p style="font-weight: bold; color: var(--primary); margin-bottom: 10px;">✅ Link Berhasil Dibuat!</p>
                            
                            <div style="background: white; padding: 12px; border-radius: 10px; border: 1px solid var(--accent); margin-bottom: 15px;">
                                <a href="${data.shortUrl}" target="_blank" style="color: var(--primary); font-weight: 800; text-decoration: none; word-break: break-all;">
                                    ${data.shortUrl}
                                </a>
                            </div>

                            <div class="qr-container">
                                <img src="${data.qrData}" alt="QR Code">
                                <br>
                                <a href="${data.qrData}" download="QR-${customCode || 'ppks'}.png" class="btn-download">
                                    ⬇️ Simpan QR Code
                                </a>
                            </div>
                        </div>
                    `;
                    resultDiv.style.display = 'block';
                } else {
                    resultDiv.innerHTML = `<p style="color: #ef4444; font-weight: 600;">❌ ${data.message}</p>`;
                }
            } catch (err) {
                resultDiv.innerHTML = `<p style="color: #ef4444;">❌ Koneksi server terputus</p>`;
            }
        };
    </script>
</body>
</html>
