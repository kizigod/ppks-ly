<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKS.Ly - Smart URL Shortener</title>
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>
    <div class="container">
        <h1>PPKS<span style="color: var(--accent);">.ly</span></h1>
        <p>Pendekkan link dan buat QR Code instan</p>

        <form id="shorten-form">
            <input type="url" id="longUrl" placeholder="https://youtube.com/..." required>
            <input type="text" id="customCode" placeholder="Custom Nama (Opsional)">
            <button type="submit">Shortenlink!</button>
        </form>

        <div id="result"></div>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(45, 90, 39, 0.1);">

        <div id="auth-section">
            <div id="login-section" style="text-align: center;">
                <p style="font-size: 0.85rem; margin-bottom: 20px;">Masuk untuk simpan link permanen</p>
                <a href="/auth/google" class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" height="18">
                    Masuk dengan Google
                </a>
            </div>

            <div id="user-profile" style="display: none; text-align: center;">
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid rgba(45, 90, 39, 0.1);">
                    <p>Halo, <span id="user-name" style="color: var(--primary); font-weight: 800;"></span>! 👋</p>
                    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 10px;">
                        <a href="/dashboard.html" class="btn-dashboard-small">Dashboard</a>
                        <a href="/logout" class="btn-logout-link">Keluar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cek Login
        async function checkLogin() {
            const res = await fetch('/api/user/status');
            const data = await res.json();
            if (data.loggedIn) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-name').innerText = data.user.displayName;
            }
        }
        checkLogin();

        // Submit Logic
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;
            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ longUrl, customCode })
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('result').innerHTML = `
                    <div class="result-card">
                        <p style="color:var(--primary); font-weight:800;">✅ Berhasil!</p>
                        <a href="${data.shortUrl}" target="_blank" style="word-break:break-all;">${data.shortUrl}</a>
                        <div class="qr-container"><img src="${data.qrData}"><br><a href="${data.qrData}" download class="btn-download">Simpan QR</a></div>
                    </div>`;
            }
        };
    </script>
</body>
</html>
