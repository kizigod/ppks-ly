<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKS.ly - Smart URL Shortener</title>
    <link rel="stylesheet" href="style.css?v=2.1">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
    <div class="container">
        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="margin: 0; font-size: 2.5rem;">PPKS<span style="color: var(--accent);">ly</span></h1>
            <p style="margin-top: 5px; color: var(--text-dark); opacity: 0.7; font-size: 0.9rem;">Solusi cerdas perpendek link & QR Code</p>
        </div>

        <form id="shorten-form">
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Link Panjang</label>
            <input type="url" id="longUrl" placeholder="https://example.com/..." required>
            
            <label style="font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px;">Custom Nama (Opsional)</label>
            <input type="text" id="customCode" placeholder="misal: info-sawit">
            
            <button type="submit">Shortenlink!</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(45, 90, 39, 0.1);">

        <div id="auth-section">
            <div id="login-section" style="text-align: center;">
                <p style="font-size: 0.85rem; margin-bottom: 20px; color: var(--text-dark);">
                    Daftar untuk mengelola riwayat link & statistik klik kamu.
                </p>
                <a href="/auth/google" class="btn-google">
                    <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18" height="18" alt="Google">
                    Masuk dengan Google
                </a>
            </div>

            <div id="user-profile" style="display: none; text-align: center;">
                <div style="background: var(--bg); padding: 15px; border-radius: 15px; border: 1px solid rgba(45, 90, 39, 0.1);">
                    <p style="margin-bottom: 15px; font-weight: 600;">Halo, <span id="user-name" style="color: var(--primary);"></span>! 👋</p>
                    <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                        <a href="/dashboard.html" style="background: var(--primary); color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 600; flex: 1;">Dashboard</a>
                        <a href="/logout" style="color: #ef4444; text-decoration: none; font-size: 0.85rem; align-self: center;">Keluar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" style="max-width: 420px;">
            <span style="position:absolute; right:20px; top:10px; cursor:pointer; font-size:24px; color: var(--accent);" onclick="closeModal()">&times;</span>
            <h2 style="color: var(--primary); margin-top: 10px;">Link Ready! 🚀</h2>
            
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <div id="modal-qr-space">
                    <img src="" id="qrImg" style="width:160px; border-radius:15px; border:4px solid var(--bg); margin-top: 10px; image-rendering: pixelated;">
                    <p style="font-size: 0.7rem; font-weight: 600; color: #666; margin: 0;">Scan QR Code</p>
                </div>

                <div id="barcode-section" style="width: 100%; text-align: center; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #ddd;">
                    <svg id="barcodeCanvas"></svg>
                    <p style="font-size: 0.7rem; font-weight: 600; color: #666; margin: 0;">Barcode (Internal Tracking)</p>
                </div>
            </div>

            <div style="background:var(--bg); padding:12px; border-radius:12px; margin:15px 0; word-break:break-all; font-weight:800; color:var(--primary); font-size: 0.9rem;" id="modal-url"></div>
            
            <button onclick="copyLink()">Salin Link</button>
            <a id="downloadBtn" href="#" download="qr-ppks.png" style="display: block; margin-top: 15px; font-size: 0.8rem; color: var(--primary); font-weight: 600; text-decoration: none;">⬇️ Download QR Code</a>
        </div>
    </div>

    <script>
        // 1. Visitor Tracking
        async function trackVisitor() {
            try { await fetch('/api/visitor/track'); } catch (err) { console.log("Visitor tracking failed"); }
        }
        trackVisitor();

        // 2. Fungsi Modal dengan Barcode Generator
        function showModal(url, qr, shortCode) {
            document.getElementById('modal-url').innerText = url;
            document.getElementById('qrImg').src = qr;
            document.getElementById('downloadBtn').href = qr;

            // Generate Barcode CODE128 secara dinamis
            JsBarcode("#barcodeCanvas", shortCode, {
                format: "CODE128",
                lineColor: "#2D5A27",
                width: 2,
                height: 40,
                displayValue: true,
                fontSize: 12
            });

            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function copyLink() { 
            const urlText = document.getElementById('modal-url').innerText;
            navigator.clipboard.writeText(urlText); 
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: 'Link disalin!',
                showConfirmButton: false,
                timer: 1500
            });
        }

        // 3. Status Login
        async function checkStatus() {
            try {
                const res = await fetch('/api/user/status');
                const data = await res.json();
                if (data.loggedIn) {
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('user-profile').style.display = 'block';
                    document.getElementById('user-name').innerText = data.user.displayName;
                }
            } catch (err) { }
        }
        checkStatus();

        // 4. Form Submission
        document.getElementById('shorten-form').onsubmit = async (e) => {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const customCode = document.getElementById('customCode').value;
            
            Swal.fire({
                title: 'Memproses...',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ longUrl, customCode })
                });
                
                const data = await res.json();
                Swal.close();

                if (res.ok) {
                    // data.shortCode didapat dari update app.js sebelumnya
                    showModal(data.shortUrl, data.qrData, data.shortCode);
                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Nama Terpakai!',
                        text: data.message,
                        confirmButtonColor: '#2D5A27'
                    });
                }
            } catch (err) { 
                Swal.fire({ icon: 'error', title: 'Server Error' });
            }
        };
    </script>
</body>
</html>
